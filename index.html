<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý chi tiêu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wallet-container">
        <h2>Ví điện tử</h2>
    
        <div class="balance-box">
            <p>Số dư: <span id="thongBaoSoDu">0</span> VND</p>
        </div>

        <div class="form-group">
            <input type="text" id="ten-khoan" placeholder="Tên khoản chi tiêu">
            <input type="number" id="so-tien" placeholder="Số tiền (VND)">
        </div>

        <div class="button-group">
            <button id="btn-thu-nhap" class="btn-in">Thu nhập</button>
            <button id="btn-chi-tieu" class="btn-out">Chi tiêu</button>
        </div>
    </div>
</body>
<script src="logic.js"></script>
</html>
